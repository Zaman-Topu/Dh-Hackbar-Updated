name: Android CI/CD Release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Build APKs
      run: gradle assembleDebug assembleRelease

    - name: Get current date for tag
      id: date
      run: echo "date=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: release-${{ steps.date.outputs.date }}
        name: HackBar Modernized - ${{ steps.date.outputs.date }}
        body: |
          Automated build generated by GitHub Actions.
          
          **Included APKs:**
          - `app-debug.apk`: Debug build (easier to install without signature issues).
          - `app-release-unsigned.apk`: Unsigned release build.
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release-unsigned.apk
